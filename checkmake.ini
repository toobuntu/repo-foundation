# checkmake (https://github.com/checkmake/checkmake) config, auto-discovered
# as ./checkmake.ini. `make lint` runs `checkmake Makefile`.
#
# maxbodylength is disabled: the install, reinstall, and dev recipes are
# legitimately multi-step (privileged /usr/local copies, plist templating,
# launchctl bootstrap) and the lint recipe aggregates the whole toolchain.
# Splitting them to satisfy a line count would hurt readability, and
# checkmake has no per-target opt-out. The structural rules (minphony,
# phonydeclared, timestampexpanded) stay on.
[maxbodylength]
disabled = true
