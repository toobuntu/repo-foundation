# Vale prose linter for repo-foundation. The canonical org-wide Toobuntu style
# and its accept vocabulary live under .vale/styles/ and sync to every consumer
# (ADR 0014); this .vale.ini is per-repo (like ci.yml) because the scope-block
# relaxations below vary by repo — foundation-init seeds a copy from
# provides/vale/vale.ini.template.
#
# Vale.Spelling ships an en_US-web dictionary that accepts many en_GB forms as
# valid English, so it catches typos, not dialect. Toobuntu.AmericanSpelling
# enforces the dialect deterministically and runs everywhere — it is
# correctness, not voice. Toobuntu.We (impersonal phrasing) and Vale.Spelling
# are the rules relaxed per-glob for working notes below.
#
# Only error-level alerts gate CI under MinAlertLevel = error; warning-level
# rules report but do not fail the build, so a new rule lands at warning, runs
# over the corpus, and is promoted to error after a clean pass (ADR 0014).
#
# Install: brew install vale
StylesPath = .vale/styles
MinAlertLevel = error
Vocab = Toobuntu

[*.md]
BasedOnStyles = Vale, Toobuntu
# Vale.Terms (canonical casing from the vocab) is off — Toobuntu.Terms covers
# casing without rejecting a sentence-initial vocab term.
Vale.Terms = NO
# Vale.Spelling rides at warning, not error: it is a typo-catcher whose
# precision depends on a comprehensive accept vocabulary, and the org-wide
# Toobuntu vocab is still maturing across every consumer's domain terms. It
# reports here but does not gate; promote it to error once the vocab covers the
# corpus cleanly (ADR 0014). Dialect (Toobuntu.AmericanSpelling) gates now — it
# is deterministic and needs no vocab.
Vale.Spelling = warning

[docs/handoff/*.md]
# Session handoffs and resume prompts are second-person working briefs full of
# tool and identifier names: the impersonal-voice rule and the dictionary
# speller are off here. en_US spelling (Toobuntu.AmericanSpelling) stays on —
# dialect is correctness, enforced everywhere.
Vale.Spelling = NO
Toobuntu.We = NO
