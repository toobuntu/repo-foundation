name: shell-lint

# shfmt (formatting) + shellcheck (static analysis) on shell, via
# scripts/lint-shell.sh --tracked — the same script the
# .githooks/pre-commit.d/05-shell plugin runs with --staged. Synced to
# non-Homebrew consumers; Homebrew-aligned repos run shfmt + shellcheck through
# `brew style` instead and do not receive this workflow (ADR 0017).

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  shell-lint:
    if: github.repository_owner == 'toobuntu'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # shellcheck is pre-installed on the runner; shfmt is not. Install shfmt
      # from the runner's Homebrew (not on PATH by default), matching a local
      # `brew install`, and prepend its bin (ADR 0014's pattern). ksh is NOT
      # installed here: lint-shell.sh runs `ksh -n` only when ksh is present
      # (stock on macOS, absent on the Ubuntu runner), so this generic workflow
      # skips it rather than paying an install on every consumer to re-check
      # scripts that came from repo-foundation. A ksh-heavy repo (cert-automation)
      # installs ksh93 in its own CI to syntax-check its own ksh scripts.
      - name: Install shfmt
        run: |
          /home/linuxbrew/.linuxbrew/bin/brew install shfmt
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Lint shell
        run: scripts/lint-shell.sh --tracked
