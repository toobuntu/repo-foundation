version: 2

updates:
  - package-ecosystem: bundler   # Gemfile.lock at the root
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      bundler:
        patterns: ["*"]
    allow:
      - dependency-type: all
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions   # .github/workflows/
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]
    allow:
      - dependency-type: all
    cooldown:
      default-days: 7
