# Flag "and/or" specifically — pick "and", pick "or", or rephrase. Scoped to
# this one construct; the general x/y slash form is left alone because it is
# usually legitimate (TCP/IP, read/write, input/output).
extends: existence
message: "Avoid '%s'; use 'and', 'or', or rephrase."
level: warning
ignorecase: true
tokens:
  - and/or
