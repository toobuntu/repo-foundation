# Flag a small, curated set of non-inclusive terms. Warning, and curated to
# avoid false positives: Git's "master" branch ref is NOT flagged (bare "master"
# is absent below); only the "master/slave" pairing is. Promote/extend per
# ADR 0014.
extends: existence
message: "Consider an inclusive alternative to '%s'."
level: warning
ignorecase: true
tokens:
  - whitelist
  - blacklist
  - master/slave
  - sanity check
  - sanity-check
