# Bootstrap scaffold for a consumer's CodeQL workflow. NOT synced: the set of
# languages a repo scans is intrinsic to that repo, so each repo owns its
# .github/workflows/codeql.yml after copying this once (strip the `.template`
# infix). Every repo scans `actions` (GitHub Actions workflows); add a matrix
# entry per source language. Objective-C is NOT supported by CodeQL (removed in
# github/codeql#14923) — use clang-tidy in ci.yml for that coverage instead.

name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "27 3 * * 1"

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    if: github.repository_owner == 'toobuntu'
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    concurrency:
      group: "codeql-${{ github.ref }}-${{ matrix.language }}"
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          # Add the repo's source language(s), for example:
          # - language: go
          #   build-mode: autobuild
          # - language: ruby
          #   build-mode: none
          # - language: swift          # requires a macOS runner (see runs-on)
          #   build-mode: manual       # add a build step before Analyze
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Add language setup here when needed, for example for Go:
      # - name: Set up Go
      #   if: matrix.language == 'go'
      #   uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      #   with:
      #     go-version-file: 'go.mod'
      #     check-latest: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
