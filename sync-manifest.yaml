# Sync manifest for repo-foundation.
#
# Declarative catalog consumed by .github/actions/sync/sync-files.rb. Drives:
#   - sync-from-upstreams.yml : pulls files from external repos (Homebrew/*)
#                               INTO this repo, applying mutations.
#   - sync-to-consumers.yml   : pushes canonical files FROM this repo to each
#                               toobuntu consumer, as PRs.
#
# Layout convention: canonical files live at their natural paths here (the
# same path they occupy in a consumer). `.template` is an INFIX
# (name.template.ext) marking files the sync transforms or the consumer edits;
# the engine strips the `.template` segment when writing the target.
#
# Component modes:
#   canonical      Byte-for-byte copy. The engine prepends a "synced from
#                  repo-foundation, do not modify" header in the file's comment
#                  syntax (chosen by extension). Source carries no such header.
#   template       Copy verbatim, strip the `.template` infix from the target
#                  name. For files a consumer is expected to keep but not edit
#                  by hand (the per-repo variation is in the template already).
#   generate       Engine builds the target per consumer (e.g. dependabot.yml
#                  filtered to the ecosystems the target actually uses).
#   baseline-merge Engine regenerates only the foundation-managed slice of the
#                  target, preserving the consumer's own content. A text target
#                  (AGENTS.md, CONTRIBUTING.md, .gitignore) keeps a
#                  sentinel-delimited region; a JSON target (.claude/settings.json)
#                  is deep-merged with the consumer's <stem>.addenda.json. The
#                  source carries a `.baseline` infix (see ADR 0002).
#
# `# CONFIRM` marks an inferred per-repo membership to validate before the
# first real sync run.

version: 1

defaults:
  strategy: pr
  branch: sync-from-foundation
  pr_title: "Sync shared configuration from repo-foundation"
  # Prepended to each `canonical`/`template` target, rendered in the target's
  # comment syntax. `%<source>s` interpolates the source path.
  synced_header: >-
    This file is synced from toobuntu/repo-foundation (%<source>s) by
    sync-to-consumers.yml; do not modify it directly.
  # Inner label text for the sentinels that bracket the foundation-managed
  # region in a baseline-merge target. The engine renders them in the target's
  # own comment syntax (# for .gitignore, <!-- --> for Markdown), so one label
  # set serves every text target; a comment-less JSON target is deep-merged.
  merge_label_begin: "repo-foundation managed baseline (regenerated by sync; edit outside this block)"
  merge_label_end: "end repo-foundation managed baseline"

# ---------------------------------------------------------------------------
# Files pulled INTO repo-foundation from external upstreams (Homebrew, etc.).
# sync-from-upstreams.yml fetches each, applies mutations, opens a PR on drift.
# ---------------------------------------------------------------------------
# Files RF mirrors from external upstreams. sync-from-upstreams.yml fetches
# each, applies the yq mutations (mikefarah yq preserves comments), prepends a
# "synced from <upstream>, do not modify it directly" header + SPDX, and opens a
# PR on drift. This is the set homebrew-cask-tools syncs today; RF supersedes that
# per-repo sync once it lands. zizmor/actionlint/matcher are pushed onward to all
# consumers via ci_core; copilot-setup-steps goes to Homebrew taps only via the
# homebrew_tap set (non-taps use a per-repo scaffold — see the ADR). For each, the
# consumer-sync engine replaces the upstream header with a repo-foundation one so
# consumers see RF as their single source.
upstreams:
  - source_repo: Homebrew/.github
    source_ref: main
    files:
      - source: .github/zizmor.yml
        target: .github/zizmor.yml
        mutations: []
  - source_repo: Homebrew/brew
    source_ref: main
    files:
      - source: .github/actionlint-matcher.json
        target: .github/actionlint-matcher.json
        mutations: []
      - source: .github/actionlint.yaml
        target: .github/actionlint.yaml
        mutations:
          - type: yq
            expression: '.config-variables = ["SYNC_APP_CLIENT_ID", "SYNC_BOT_SIGN", "SYNC_BOT_NAME", "SYNC_BOT_EMAIL"]'
          - type: yq
            expression: 'del(.paths)'   # drop Homebrew/brew-internal path rules
      - source: .github/workflows/copilot-setup-steps.yml
        target: .github/workflows/copilot-setup-steps.yml
        mutations:
          - type: yq
            expression: >-
              (.jobs.copilot-setup-steps.steps[]
              | select(.uses // "" | test("Homebrew/actions/setup-homebrew@"))).with.core = false
          - type: yq
            expression: >-
              (.jobs.copilot-setup-steps.steps[]
              | select(.uses // "" | test("Homebrew/actions/setup-homebrew@"))).with.cask = false
          - type: yq
            expression: >-
              (.jobs.copilot-setup-steps.steps[]
              | select(.uses // "" | test("Homebrew/actions/cache-homebrew-prefix@"))).with.install |= . + " actionlint reuse pinact zizmor fzf"

# ---------------------------------------------------------------------------
# Reusable component groups, referenced by name from each consumer below.
# Each component: {source, target, mode}. source/target are repo-relative.
# ---------------------------------------------------------------------------
component_sets:
  agent_docs:
    - { source: docs/agent-principles.md, target: docs/agent-principles.md, mode: canonical }
    # Universal "do not touch LICENSES/" instruction for AI agents. Identical
    # across repos modulo the license line; canonical here.
    - { source: .github/instructions/licenses.instructions.md, target: .github/instructions/licenses.instructions.md, mode: canonical }

  # Base hooks (repo-agnostic, NO language checks) — canonical to ALL repos.
  git_hooks:
    - { source: .githooks/pre-commit, target: .githooks/pre-commit, mode: canonical }
    - { source: .githooks/pre-push,   target: .githooks/pre-push,   mode: canonical }

  # Per-language pre-commit.d plugin MASTERS (run-parts classicalre names, no
  # extension). RF owns them; each syncs ONLY to consumers of that language, so
  # one fix propagates. RF runs the base hook itself (.githooks/ at its natural
  # path) but not these language plugins, so the masters live under
  # provides/githooks/ — mirroring the consumer's .githooks/ exactly as
  # provides/github/workflows/ mirrors .github/workflows/ (ADR 0017). The plugin
  # naming, run-parts rule, and core.hooksPath activation are settled in ADR 0017.
  go_plugin:
    - { source: provides/githooks/pre-commit.d/10-go,   target: .githooks/pre-commit.d/10-go,   mode: canonical }
  objc_plugin:
    - { source: provides/githooks/pre-commit.d/20-objc, target: .githooks/pre-commit.d/20-objc, mode: canonical }
  # Homebrew-tap toolchain plugin: brew style on staged Ruby (and shell). Maps to
  # tap consumers only (cask-tools today). brew style is tap-specific; a generic
  # Ruby repo would get a different plugin (e.g. bundle exec rubocop).
  brew_plugin:
    - { source: provides/githooks/pre-commit.d/30-brew, target: .githooks/pre-commit.d/30-brew, mode: canonical }
  # Swift toolchain plugin: swiftformat + swiftlint on staged .swift. Maps to
  # Swift consumers. cert-automation ships Swift helper scripts (active);
  # _dormant/powerstatus (a swiftc-compiled CLI) is the original driver and
  # adopts this when revived; babble carries Swift only in archive/ + stash/
  # today, but its W3 external-command rewrite may revive the JXA quit_alert.swift
  # — a candidate then. macOS-oriented but tool-gated, so it no-ops where the
  # formatters are absent; it also bypasses the on-disk cache so swiftlint does
  # not fail on an unwritable cache under a sandbox (see ADR 0017 and
  # docs/agent-principles.md).
  swift_plugin:
    - { source: provides/githooks/pre-commit.d/40-swift, target: .githooks/pre-commit.d/40-swift, mode: canonical }
  # ADR-health plugin: `adrs doctor` when docs/decisions/** or adrs.toml is
  # staged. Unlike the language plugins, this master lives at the NATURAL path —
  # repo-foundation authors most org-wide ADRs and runs it on its own commits
  # (ADR 0001). It maps to every hook-carrying consumer (all but dot-github):
  # each already receives adrs.toml (repo_config) and keeps repo-specific ADRs
  # (ADR 0004), and the staged-file gate makes it a no-op elsewhere. CI backstop
  # is the lint-adrs job in lint.yml (ci_core). See ADR 0018.
  adrs_plugin:
    - { source: .githooks/pre-commit.d/50-adrs, target: .githooks/pre-commit.d/50-adrs, mode: canonical }

  # Shell linting (shfmt + shellcheck), the config it reads, the shared script,
  # the pre-commit plugin, and the CI job. Synced to NON-Homebrew consumers.
  # Homebrew-aligned repos (cask-tools, babble) are EXCLUDED: they defer to
  # `brew style` (which runs shfmt + shellcheck with Homebrew's four-space config
  # copied verbatim from Homebrew/brew), so they must not also receive RF's
  # two-space .editorconfig/.shellcheckrc or the 05-shell plugin. See ADR 0017.
  shell_lint:
    - { source: .editorconfig,                           target: .editorconfig,                    mode: canonical }
    - { source: .shellcheckrc,                           target: .shellcheckrc,                    mode: canonical }
    - { source: scripts/lint-shell.sh,                   target: scripts/lint-shell.sh,            mode: canonical }
    - { source: .github/workflows/shell-lint.yml,        target: .github/workflows/shell-lint.yml, mode: canonical }
    - { source: provides/githooks/pre-commit.d/05-shell, target: .githooks/pre-commit.d/05-shell,  mode: canonical }

  scripts_core:
    - { source: scripts/lint-perms.sh,                 target: scripts/lint-perms.sh,                 mode: canonical }
    - { source: scripts/lint-unicode.sh,               target: scripts/lint-unicode.sh,               mode: canonical }
    - { source: scripts/annotate.sh,                   target: scripts/annotate.sh,                   mode: canonical }
    - { source: scripts/rewrite-pr-as-merge-commit.sh, target: scripts/rewrite-pr-as-merge-commit.sh, mode: canonical }
    - { source: scripts/re-sign-unpushed.sh,           target: scripts/re-sign-unpushed.sh,           mode: canonical }
    # foundation-doctor runs in each consumer (the scaffold-drift workflow calls
    # it). foundation-init is RF-only — a consumer does not bootstrap others — so
    # it is intentionally NOT synced.
    - { source: scripts/foundation-doctor.sh,          target: scripts/foundation-doctor.sh,          mode: canonical }

  sandbox:
    - { source: scripts/sandbox-enter.sh,        target: scripts/sandbox-enter.sh,        mode: canonical }
    - { source: scripts/sandbox-exit.sh,         target: scripts/sandbox-exit.sh,         mode: canonical }
    - { source: scripts/sandbox-vm-bootstrap.sh, target: scripts/sandbox-vm-bootstrap.sh, mode: canonical }
    - { source: scripts/sandbox-vm-enter.sh,     target: scripts/sandbox-vm-enter.sh,     mode: canonical }
    - { source: scripts/sandbox-vm-exit.sh,      target: scripts/sandbox-vm-exit.sh,      mode: canonical }

  repo_config:
    - { source: adrs.toml,      target: adrs.toml,      mode: canonical }
    - { source: .pinact.yaml,   target: .pinact.yaml,   mode: canonical }
    - { source: checkmake.ini,  target: checkmake.ini,  mode: canonical }

  # Canonical CI for every repo. zizmor.yml / actionlint.yaml / matcher are
  # upstream-tracked (see `upstreams`); actionlint.yml + lint.yml are RF-authored.
  # The matcher is JSON (no comment syntax) so it carries a .license sidecar and
  # copies without a header. For relayed files the engine strips the upstream
  # "do not modify it directly" header and writes a repo-foundation one, so
  # consumers see RF as their single source.
  ci_core:
    - { source: .github/zizmor.yml,                      target: .github/zizmor.yml,                      mode: canonical }
    - { source: .github/actionlint.yaml,                 target: .github/actionlint.yaml,                 mode: canonical }
    - { source: .github/actionlint-matcher.json,         target: .github/actionlint-matcher.json,         mode: canonical }
    - { source: .github/actionlint-matcher.json.license, target: .github/actionlint-matcher.json.license, mode: canonical }
    - { source: .github/workflows/actionlint.yml,        target: .github/workflows/actionlint.yml,        mode: canonical }
    - { source: .github/workflows/lint.yml,              target: .github/workflows/lint.yml,              mode: canonical }
    # Scheduled scaffold-staleness nudge (ADR 0015); pairs with the synced
    # scripts/foundation-doctor.sh it runs.
    - { source: .github/workflows/scaffold-drift.yml,    target: .github/workflows/scaffold-drift.yml,    mode: canonical }

  # Canonical org-wide Toobuntu prose style + vocab + the Vale CI job (ADR 0014).
  # The style RULES and the accept VOCAB are byte-identical org-wide, so they
  # sync canonically. The per-repo `.vale.ini` is NOT synced — its scope-block
  # relaxations vary by repo — so foundation-init seeds it once from
  # provides/vale/vale.ini.template. A consumer that already ships a local style
  # (zman-didan's Didan) migrates to consume this and drops the local copy.
  prose_lint:
    - { source: .vale/styles/Toobuntu/AmericanSpelling.yml,     target: .vale/styles/Toobuntu/AmericanSpelling.yml,     mode: canonical }
    - { source: .vale/styles/Toobuntu/We.yml,                  target: .vale/styles/Toobuntu/We.yml,                  mode: canonical }
    - { source: .vale/styles/Toobuntu/AbbreviationPlurals.yml, target: .vale/styles/Toobuntu/AbbreviationPlurals.yml, mode: canonical }
    - { source: .vale/styles/Toobuntu/MergeConflictMarkers.yml, target: .vale/styles/Toobuntu/MergeConflictMarkers.yml, mode: canonical }
    - { source: .vale/styles/Toobuntu/NonStandardQuotes.yml,   target: .vale/styles/Toobuntu/NonStandardQuotes.yml,   mode: canonical }
    - { source: .vale/styles/Toobuntu/SentenceSpacing.yml,     target: .vale/styles/Toobuntu/SentenceSpacing.yml,     mode: canonical }
    - { source: .vale/styles/Toobuntu/WordSlashWord.yml,       target: .vale/styles/Toobuntu/WordSlashWord.yml,       mode: canonical }
    - { source: .vale/styles/Toobuntu/Acronyms.yml,            target: .vale/styles/Toobuntu/Acronyms.yml,            mode: canonical }
    - { source: .vale/styles/Toobuntu/Terms.yml,               target: .vale/styles/Toobuntu/Terms.yml,               mode: canonical }
    - { source: .vale/styles/Toobuntu/InclusiveLanguage.yml,   target: .vale/styles/Toobuntu/InclusiveLanguage.yml,   mode: canonical }
    - { source: .vale/styles/config/vocabularies/Toobuntu/accept.txt,         target: .vale/styles/config/vocabularies/Toobuntu/accept.txt,         mode: canonical }
    - { source: .vale/styles/config/vocabularies/Toobuntu/accept.txt.license, target: .vale/styles/config/vocabularies/Toobuntu/accept.txt.license, mode: canonical }
    - { source: .github/workflows/prose.yml,                   target: .github/workflows/prose.yml,                   mode: canonical }

  # codeql.yml and ci.yml are NOT synced: each is intrinsic to the repo (CodeQL
  # languages; build/test steps). copilot-setup-steps is per-repo too EXCEPT for
  # Homebrew taps (see homebrew_tap below). RF ships bootstrap scaffolds at
  # provides/github/workflows/{codeql,ci,copilot-setup-steps}.template.yml that
  # foundation-init copies once; the consumer then owns them.
  ci_templates:
    - { source: .github/actions/sync/dependabot.template.yml, target: .github/dependabot.yml, mode: generate }

  # copilot-setup-steps, synced to Homebrew TAPS only (cask-tools, future taps).
  # The Homebrew/brew base genuinely fits a tap — a tap's `brew tests` use brew's
  # bundler-gems/test env — so taps track it from upstream (see upstreams), and
  # adding a future tap is just a manifest entry. It drives the Copilot CODING
  # AGENT (the Cloud agent, in Copilot Pro), NOT Copilot Code Review. NON-tap
  # repos that run the agent (babble, etc.) use the per-repo scaffold at
  # provides/github/workflows/copilot-setup-steps.template.yml — see the ADR.
  homebrew_tap:
    - { source: .github/workflows/copilot-setup-steps.yml, target: .github/workflows/copilot-setup-steps.yml, mode: canonical }

  ruby_hook_tests:
    - { source: Gemfile,                                  target: Gemfile,                                  mode: canonical }
    - { source: Gemfile.lock,                             target: Gemfile.lock,                             mode: canonical }
    - { source: .rspec,                                   target: .rspec,                                   mode: canonical }
    - { source: .bundle/config, target: .bundle/config, mode: canonical }
    - { source: spec/spec_helper.rb,                      target: spec/spec_helper.rb,                      mode: canonical }
    - { source: spec/integration/lint_perms_spec.rb,      target: spec/integration/lint_perms_spec.rb,      mode: canonical }
    - { source: spec/integration/precommit_reuse_spec.rb, target: spec/integration/precommit_reuse_spec.rb, mode: canonical }
    - { source: spec/integration/precommit_unicode_spec.rb, target: spec/integration/precommit_unicode_spec.rb, mode: canonical }
    - { source: spec/integration/prepush_signing_spec.rb, target: spec/integration/prepush_signing_spec.rb, mode: canonical }
    - { source: .github/workflows/spec.yml,               target: .github/workflows/spec.yml,               mode: canonical }

  objc:
    - { source: provides/objc/.clang-format, target: .clang-format, mode: canonical }
    - { source: provides/objc/.clang-tidy,   target: .clang-tidy,   mode: canonical }

  # Per-repo baselines: a thin canonical CLAUDE.md pointer plus four
  # baseline-merge sources. The `.baseline` infix marks a perpetually-managed
  # region, distinct from `.template`'s copy-once / transform (see ADR 0002).
  # AGENTS.md, CONTRIBUTING.md, and .gitignore take a sentinel-delimited text
  # region; .claude/settings.json is deep-merged with the consumer's own
  # settings.addenda.json (JSON has no comment to delimit a region). The settings
  # sidecar syncs canonically so the generated settings.json carries its SPDX.
  # The org-wide baseline CONTRIBUTING is RF-hosted; dot-github holds only a stub
  # fallback, and RF's own CONTRIBUTING.md adds the sync-hub specifics.
  repo_baseline:
    - { source: provides/repo/CLAUDE.md,                      target: CLAUDE.md,                     mode: canonical }
    - { source: provides/repo/AGENTS.baseline.md,            target: AGENTS.md,                     mode: baseline-merge }
    - { source: provides/repo/CONTRIBUTING.baseline.md,      target: CONTRIBUTING.md,               mode: baseline-merge }
    - { source: provides/repo/gitignore.baseline,           target: .gitignore,                    mode: baseline-merge }
    - { source: provides/repo/settings.baseline.json,        target: .claude/settings.json,         mode: baseline-merge }
    - { source: provides/repo/settings.baseline.json.license, target: .claude/settings.json.license, mode: canonical }

# ---------------------------------------------------------------------------
# GitHub "default community health files" served as org-wide fallbacks from the
# repo literally named `.github` (which must be PUBLIC). For any toobuntu repo
# that lacks its own copy, GitHub serves dot-github's version; a repo's OWN file
# (looked up in .github/, then the root, then docs/) overrides it. These served
# files never appear in a consumer's file browser, Git history, or clones. So
# the RF sync does NOT distribute SECURITY, the PR/issue templates, or the org
# profile — GitHub already serves them everywhere, and syncing a copy into each
# repo would only override the very fallback that makes them centralized.
#
# CONTRIBUTING is the deliberate exception. A consumer gets a MANAGED, per-repo
# CONTRIBUTING.md (it appears in the repo and overrides the dot-github default),
# because the baseline-merge model gives it an org-wide region plus room for
# repo-specific notes — which a single served default cannot. The org-wide
# BASELINE is RF-hosted (provides/repo/CONTRIBUTING.baseline.md) and synced via
# the repo_baseline set; dot-github keeps a stub CONTRIBUTING only as the
# fallback for repos not yet onboarded to the sync. RF's own CONTRIBUTING.md
# adds sync-hub specifics.
#
# Issue templates are all-or-nothing: a repo with ANY file in its own
# .github/ISSUE_TEMPLATE/ ignores ALL of dot-github's, so RF never syncs a
# partial template set into a consumer.
# ---------------------------------------------------------------------------
community_health_source:
  repo: toobuntu/dot-github
  # Confirmed against dot-github's tree. GitHub serves these as org-wide defaults
  # for any toobuntu repo that lacks its own; the RF sync does not distribute them.
  files:
    - SECURITY.md
    - PULL_REQUEST_TEMPLATE.md
    - ISSUE_TEMPLATE/bug_report.md
    - ISSUE_TEMPLATE/feature_request.md
    - ISSUE_TEMPLATE/config.yml
    - profile/README.md
  # CONTRIBUTING is the exception: the org-wide BASELINE is RF-hosted
  # (provides/repo/CONTRIBUTING.baseline.md) and synced to consumers with a
  # managed region; dot-github's stub CONTRIBUTING fallback is pending W5 (the
  # repo is still pre-initial-commit). dot-github's own README.md is not an
  # org-served file, so it is not listed here.

# ---------------------------------------------------------------------------
# Consumers. `sets` lists component_sets to include; `exclude` drops specific
# targets from those sets; `extra` adds one-off components.
# ---------------------------------------------------------------------------
consumers:
  - repo: toobuntu/blackoutd
    sets: [agent_docs, prose_lint, git_hooks, shell_lint, objc_plugin, adrs_plugin, scripts_core, sandbox, repo_config, ci_core, ci_templates, ruby_hook_tests, objc, repo_baseline]

  - repo: toobuntu/zman-didan
    sets: [agent_docs, prose_lint, git_hooks, shell_lint, go_plugin, adrs_plugin, scripts_core, sandbox, repo_config, ci_core, ci_templates, repo_baseline]  # CONFIRM ruby_hook_tests? zman-didan drops its local Didan style for the synced Toobuntu (prose_lint).

  - repo: toobuntu/babble
    # babble is a Homebrew / mas-cli / softwareupdate wrapper but NOT a tap, so its
    # copilot-setup-steps is per-repo (copy the scaffold, add `mas`) — see the ADR.
    # CONFIRM ruby_hook_tests once babble is Ruby. CONFIRM swift_plugin if W3
    # revives the JXA quit_alert.swift from archive/ into active source.
    sets: [agent_docs, prose_lint, git_hooks, adrs_plugin, scripts_core, sandbox, repo_config, ci_core, ci_templates, repo_baseline]

  - repo: toobuntu/bob-book
    sets: [agent_docs, prose_lint, git_hooks, shell_lint, adrs_plugin, scripts_core, repo_config, ci_core, ci_templates, repo_baseline]  # CONFIRM sandbox?

  - repo: toobuntu/cert-automation
    # Ships Swift helper scripts (scripts/cert-notify/*.swift), so it takes the
    # swift_plugin. CONFIRM whether swiftformat/swiftlint should gate those
    # helpers, and CONFIRM sandbox.
    sets: [agent_docs, prose_lint, git_hooks, shell_lint, swift_plugin, adrs_plugin, scripts_core, repo_config, ci_core, ci_templates, repo_baseline]  # shell_lint handles cert-automation's ksh93 (.ksh) via lint-shell.sh's dialect split: shellcheck --shell=ksh + ksh -n where present, shfmt skipped. Its own lint.yml shellcheck/reuse jobs are now canonical.

  - repo: toobuntu/homebrew-cask-tools
    # Homebrew tap: canonical base hooks PLUS the brew-style plugin (brew_plugin)
    # carrying its Ruby/shell `brew style` checks. Reconciled org-wide like the rest.
    # (cask-tools also keeps its own post-merge/post-rewrite hooks, which are
    # tap-specific and outside the canonical base.)
    sets: [agent_docs, prose_lint, git_hooks, brew_plugin, adrs_plugin, scripts_core, repo_config, ci_core, ci_templates, homebrew_tap, repo_baseline]

  - repo: toobuntu/dot-github
    # Mostly a source (see `sources`); as a consumer it takes the agent docs
    # and shared scripts only.
    sets: [agent_docs, scripts_core, repo_config]  # CONFIRM
